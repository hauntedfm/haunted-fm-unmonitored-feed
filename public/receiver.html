<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Haunted FM | Feed Receiver</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="signal-shell receiver-shell">
    <main class="receiver-grid">
      <section class="receiver-console">
        <img class="receiver-logo" src="https://6a2dbb67a5cda10213c3c946--relaxed-empanada-796ca3.netlify.app/haunted-fm-logo-transparent.png" alt="Haunted FM">
        <p class="eyebrow">PRIVATE RECEIVER</p>
        <h1>Unmonitored Feed Receiver</h1>
        <p id="receiverStatus" class="status">CONNECTING RECEIVER</p>

        <audio id="remoteAudio" autoplay controls></audio>

        <div class="receiver-actions">
          <button id="muteButton" type="button" disabled>EMERGENCY MUTE</button>
          <button id="disconnectButton" class="secondary" type="button" disabled>FORCE DISCONNECT</button>
        </div>
      </section>

      <section class="receiver-board">
        <h2>Feed Status</h2>
        <dl>
          <div>
            <dt>Receiver</dt>
            <dd id="receiverState">OFFLINE</dd>
          </div>
          <div>
            <dt>Room</dt>
            <dd id="roomState">SCANNING</dd>
          </div>
          <div>
            <dt>Caller</dt>
            <dd id="callerState">NO ACTIVE CALLER</dd>
          </div>
          <div>
            <dt>Countdown</dt>
            <dd id="countdownState">00:00</dd>
          </div>
          <div>
            <dt>Output</dt>
            <dd id="outputState">ROUTE THIS BROWSER AUDIO INTO THE FEED</dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/receiver.js"></script>
  </body>
</html>
